language: en
useGitignore: true
# TODO enableGlobDot: true
ignorePaths:
  # Excluded from spelling check
  - cspell.yml
  - package.json
  - package-lock.json
  - tsconfig.json
  - benchmark/github-schema.graphql
  - benchmark/github-schema.json
  - website/icons
  - website/css
  - website/pages/api-v16
  - website/pages/api-v17
overrides:
  - filename: 'website/**'
    dictionaries:
      - fullstack
    words:
      - callout
      - Vite
      - craco
      - rollup
      - Rsbuild
      - Rspack
      - Turbopack
      - esbuild
      - swcrc
      - noreferrer
      - xlink
      - codegen
      - composability
      - deduplication
      - Vitest
      - hardcoding
      - debuggable
      - subschema
      - subschemas
      - NATS
      - benjie
      - codegen
      - URQL
      - tada
      - Graphile
      - precompiled
      - debuggable
      - dataloaders

ignoreRegExpList:
  - u\{[0-9a-f]{1,8}\}
  - href="/api-v1[67]/[^"]+"
  - \(/api-v1[67]/[^)]+\)

words:
  - backticks
  - Coodinate
  - entrypoints
  - metafield
  - graphiql
  - Jsdocs
  - sublinks
  - thunked
  - tsdoc
  - worktree
  - worktrees
  - walkthrough
  - instanceof
  - apos
  - middot

  # Different names used inside tests
  - Skywalker
  - Leia
  - Wilhuff
  - Tarkin
  - Artoo
  - Threepio
  - Odie
  - Odie's
  - Damerau
  - Alderaan
  - Tatooine
  - astromech

  # TODO: contribute upstream
